[tool.poetry]
name = "spec-engine"
version = "0.1.0"
description = "Shared core engine for YAML-based HTTP test specifications"
authors = ["OpenAI <support@openai.com>"]
readme = "README.md"
packages = [{ include = "spec_engine", from = "src" }]

[tool.poetry.dependencies]
python = "^3.11"
httpx = { version = "^0.28.1", extras = ["http2"] }
PyYAML = "^6.0.2"
python-dateutil = "^2.9.0.post0"
platformdirs = "^4.3.7"

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.5"
pytest-asyncio = "^0.26.0"
ruff = "^0.11.6"
mypy = "^1.15.0"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
pythonpath = ["src"]
asyncio_mode = "auto"

[build-system]
requires = ["poetry-core>=1.9.0"]
build-backend = "poetry.core.masonry.api"
